<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0053cd"/>
      <stop offset="100%" stop-color="#146bfb"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="36" height="36" rx="9" fill="url(#lg)"/>
  <!-- Chat bubble left (sales) -->
  <rect x="7" y="9" width="14" height="10" rx="3" fill="white" opacity="0.9"/>
  <polygon points="9,19 12,19 9,23" fill="white" opacity="0.9"/>
  <!-- Chat bubble right (business) -->
  <rect x="15" y="17" width="14" height="10" rx="3" fill="white"/>
  <polygon points="27,27 24,27 27,31" fill="white"/>
  <!-- Center dot representing the deal/contract link -->
  <circle cx="18" cy="18" r="2" fill="#146bfb"/>
  <circle cx="18" cy="18" r="1" fill="white"/>
</svg>

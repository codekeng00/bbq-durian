<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DealMaker active sales pipelines dashboard.">
    <title>DealMaker | Active Pipelines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="dashboard-shell" data-node-id="14:187">
      <aside class="sidebar" aria-label="Primary navigation" data-node-id="14:225">
        <a class="product-brand" href="dashboard.html" data-node-id="14:227">
          <span class="product-mark" data-node-id="14:228">
            <img src="assets/dashboard-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="product-name">
            <strong data-node-id="14:233">DealMaker</strong>
            <small data-node-id="14:235">AI Intelligence</small>
          </span>
        </a>
        <nav class="sidebar-actions" data-node-id="14:237">
          <a class="logout-link" href="index.html" data-node-id="14:238">
            <img src="assets/dashboard-logout.svg" alt="" aria-hidden="true">
            <span data-node-id="14:242">Logout</span>
          </a>
        </nav>
      </aside>

      <div class="main-area" data-node-id="14:188">
        <header class="page-header" data-node-id="14:189">
          <h1 data-node-id="14:192">Welcome back, Susu</h1>
        </header>
        <main class="content-canvas" data-node-id="14:193">
          <div class="page-spacer" aria-hidden="true"></div>
          <section class="empty-state" aria-labelledby="empty-state-title" data-node-id="14:195">
            <div class="empty-art-margin" aria-hidden="true">
              <div class="empty-art">
                <span class="art-glow"></span>
                <span class="art-tile">
                  <img class="analytics-icon" src="assets/dashboard-analytics.svg" alt="">
                </span>
                <span class="floating-icon brain-icon">
                  <img src="assets/dashboard-brain.svg" alt="">
                </span>
                <span class="floating-icon check-icon">
                  <img src="assets/dashboard-check.svg" alt="">
                </span>
                <span class="floating-icon message-icon">
                  <img src="assets/dashboard-message.svg" alt="">
                </span>
              </div>
            </div>
            <div class="empty-copy">
              <h2 id="empty-state-title">No Active Pipelines Found</h2>
              <p>
                Your pipeline is currently quiet. Start a new conversation<br>
                analysis or upload a sales call to see Nexus AI's<br>
                intelligence in action.
              </p>
              <div class="empty-action">
                <button class="new-button" type="button">
                  <img src="assets/dashboard-plus.svg" alt="" aria-hidden="true">
                  New
                </button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="script.js"></script>
